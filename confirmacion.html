<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TechStore — Compra confirmada</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { cyan: { 400: '#22d3ee', 500: '#06b6d4' } },
          keyframes: {
            'fade-up': {
              '0%':   { opacity: '0', transform: 'translateY(24px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            },
            'pop-in': {
              '0%':   { opacity: '0', transform: 'scale(0.5)' },
              '70%':  { transform: 'scale(1.1)' },
              '100%': { opacity: '1', transform: 'scale(1)' },
            },
          },
          animation: {
            'fade-up':      'fade-up 0.5s ease both',
            'fade-up-slow': 'fade-up 0.7s ease 0.2s both',
            'pop-in':       'pop-in 0.6s cubic-bezier(.22,.68,0,1.2) both',
          },
        },
      },
    }
  </script>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen flex flex-col">

  <!-- NAVBAR (estático, logo + nombre) -->
  <header class="bg-gray-900 border-b border-gray-800">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center">
      <a href="index.html" class="flex items-center gap-2 group">
        <div class="w-8 h-8 rounded-lg bg-cyan-500 flex items-center justify-center shadow-lg shadow-cyan-500/30 group-hover:bg-cyan-400 transition-colors">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-gray-900" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 3H5a2 2 0 00-2 2v4m6-6h10a2 2 0 012 2v4M9 3v18m0 0h10a2 2 0 002-2V9M9 21H5a2 2 0 01-2-2V9m0 0h18" />
          </svg>
        </div>
        <span class="text-white font-extrabold text-lg tracking-tight group-hover:text-cyan-400 transition-colors">TechStore</span>
      </a>
    </div>
  </header>

  <!-- MAIN -->
  <main class="flex-1 flex items-center justify-center px-4 py-16">
    <div class="w-full max-w-lg animate-fade-up">

      <!-- Card principal -->
      <div class="bg-gray-900 border border-gray-800 rounded-3xl shadow-2xl shadow-black/50 p-8 sm:p-10">

        <!-- Ícono check animado -->
        <div class="flex justify-center mb-6">
          <div class="animate-pop-in w-24 h-24 rounded-full bg-emerald-500/15 border-2 border-emerald-500/40
                      flex items-center justify-center shadow-xl shadow-emerald-500/10">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 text-emerald-400" fill="none"
                 viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
            </svg>
          </div>
        </div>

        <!-- Título y mensaje -->
        <div class="text-center mb-8 animate-fade-up-slow">
          <h1 class="text-2xl sm:text-3xl font-extrabold text-white mb-3">
            ¡Compra registrada con éxito!
          </h1>
          <p class="text-gray-400 text-sm sm:text-base leading-relaxed">
            Nos comunicaremos con vos por email para coordinar el pago.<br />
            Nuestro correo oficial es&nbsp;
            <a href="mailto:techstore@gmail.com"
               class="text-cyan-400 hover:text-cyan-300 font-semibold transition-colors">
              techstore@gmail.com
            </a>
          </p>
        </div>

        <!-- Resumen de la compra -->
        <div id="resumen" class="mb-8 animate-fade-up-slow">
          <h2 class="text-xs font-semibold uppercase tracking-widest text-gray-500 mb-3">
            Resumen del pedido
          </h2>
          <div id="lista-productos" class="space-y-2"></div>
          <div class="mt-4 pt-4 border-t border-gray-800 flex justify-between items-center">
            <span class="text-white font-bold">Total</span>
            <span id="total-compra" class="text-cyan-400 font-extrabold text-xl"></span>
          </div>
        </div>

        <!-- Botón volver -->
        <a href="index.html"
           class="block w-full text-center bg-cyan-500 hover:bg-cyan-400 active:scale-95 text-gray-900
                  font-bold py-3.5 rounded-xl transition-all duration-200 shadow-lg shadow-cyan-500/25
                  animate-fade-up-slow">
          ← Volver al inicio
        </a>

      </div>
    </div>
  </main>

  <!-- FOOTER -->
  <footer class="bg-gray-900 border-t border-gray-800 py-8 px-4">
    <div class="max-w-7xl mx-auto flex flex-col sm:flex-row items-center justify-between gap-4">
      <p class="text-gray-500 text-sm">© 2026 TechStore. Todos los derechos reservados.</p>
      <div class="flex gap-6 text-sm text-gray-500">
        <a href="index.html"   class="hover:text-cyan-400 transition-colors">Inicio</a>
        <a href="filtrar.html" class="hover:text-cyan-400 transition-colors">Filtrar</a>
        <a href="carrito.html" class="hover:text-cyan-400 transition-colors">Carrito</a>
      </div>
    </div>
  </footer>

  <script>
    (function () {
      function formatearPrecio(n) {
        return '$' + Number(n).toLocaleString('es-AR');
      }

      const data = JSON.parse(localStorage.getItem('ultimaCompra') || 'null');

      if (!data || !data.productos?.length) {
        document.getElementById('resumen').classList.add('hidden');
        return;
      }

      const lista = document.getElementById('lista-productos');
      lista.innerHTML = data.productos.map(p => `
        <div class="flex justify-between items-center text-sm py-1.5
                    border-b border-gray-800 last:border-0">
          <span class="text-gray-300">
            <span class="text-white font-semibold">${p.nombre}</span>
            <span class="text-gray-500 ml-1">× ${p.cantidad}</span>
          </span>
          <span class="text-gray-300 font-medium whitespace-nowrap ml-4">
            ${formatearPrecio(p.precio * p.cantidad)}
          </span>
        </div>
      `).join('');

      document.getElementById('total-compra').textContent = formatearPrecio(data.total);
    })();
  </script>

</body>
</html>
